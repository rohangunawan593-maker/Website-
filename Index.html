<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker PRO MAX ULTIMATE</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

window.startAppFirebase = function(){

const firebaseConfig = {
  apiKey: "AIzaSyDh5M6Nm7V9nCYfFXk__5SA8kjhKWDMPUM",
  authDomain: "tracker-hp-d5a78.firebaseapp.com",
  projectId: "tracker-hp-d5a78",
  storageBucket: "tracker-hp-d5a78.firebasestorage.app",
  messagingSenderId: "975473003783",
  appId: "1:975473003783:web:6e165a082d04f4a7e489a2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let map;
let markers = {};
let pathLine;
let path = [];
let deviceName = "";

// REGISTER
window.register = async function(){
    try{
        await createUserWithEmailAndPassword(auth, email.value, pass.value);
        alert("✅ Akun dibuat");
    }catch(e){ alert(e.message); }
}

// LOGIN
window.login = async function(){
    try{
        await signInWithEmailAndPassword(auth, email.value, pass.value);
        initApp();
    }catch(e){ alert(e.message); }
}

// INIT APP
function initApp(){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    map = new google.maps.Map(document.getElementById("map"), {
        zoom: 15,
        center: {lat:0,lng:0}
    });

    deviceName = prompt("Nama HP kamu");

    startTracking();
    loadDevices();
    loadHistory();
}

// ⚡ LIVE TRACKING
function startTracking(){
    navigator.geolocation.watchPosition(pos=>{
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;

        // SIMPAN DEVICE
        set(ref(db, "devices/"+auth.currentUser.uid+"/"+deviceName), {
            lat, lon, time: Date.now()
        });

        // SIMPAN HISTORY
        push(ref(db, "history/"+auth.currentUser.uid+"/"+deviceName), {
            lat, lon, time: Date.now()
        });

        // STATUS
        document.getElementById("status").innerHTML =
            "📍 "+lat+", "+lon;

        // 🔋 BATTERY
        if(navigator.getBattery){
            navigator.getBattery().then(b=>{
                let lvl = Math.floor(b.level*100);
                document.getElementById("status").innerHTML += "<br>🔋 "+lvl+"%";
            });
        }

        // 📲 WHATSAPP LINK
        let wa = `https://wa.me/?text=Lokasi saya: https://maps.google.com/?q=${lat},${lon}`;
        window.open(wa, "_blank");

    }, err=>{
        alert("GPS error");
    },{
        enableHighAccuracy:true
    });
}

// 👥 MULTI DEVICE
function loadDevices(){
    onValue(ref(db, "devices"), snap=>{
        let data = snap.val();
        if(!data) return;

        for(let uid in data){
            for(let name in data[uid]){
                let d = data[uid][name];
                let posisi = {lat:d.lat, lng:d.lon};

                if(!markers[name]){
                    markers[name] = new google.maps.Marker({
                        map: map,
                        label: name
                    });
                }

                markers[name].setPosition(posisi);
            }
        }
    });
}

// 📊 HISTORY TRACK
function loadHistory(){
    onValue(ref(db, "history/"+auth.currentUser.uid+"/"+deviceName), snap=>{
        let data = snap.val();
        if(!data) return;

        path = [];

        for(let id in data){
            path.push({
                lat:data[id].lat,
                lng:data[id].lon
            });
        }

        if(pathLine) pathLine.setMap(null);

        pathLine = new google.maps.Polyline({
            path: path,
            map: map,
            strokeWeight: 4
        });
    });
}

}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=API_KEY&callback=startAppFirebase" async defer></script>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}
input,button{
    padding:10px;
    margin:5px;
    border-radius:5px;
    border:none;
}
button{
    background:#22c55e;
    color:white;
}
#map{
    width:100%;
    height:400px;
    margin-top:20px;
}
</style>
</head>

<body>

<h2>📍 Tracker PRO MAX ULTIMATE</h2>

<div id="auth">
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<div id="app" style="display:none;">
<p id="status">Menunggu lokasi...</p>
<div id="map"></div>
</div>

</body>
</html>
